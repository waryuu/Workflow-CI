name: MLflow CI Docker Build

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: pip install mlflow dagshub scikit-learn pandas

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        mlflow models build-docker -m "models:/Premier_League_Rating/latest" -n "waryuu9/pl-model-ci:latest" --enable-mlserver
        
    - name: Push to Docker Hub
      run: docker push waryuu9/pl-model-ci:latest