name: MLflow CI Docker Build

on:
  push:
    branches: 
    - main 
    pull_request:
      branches:
        - main

env:
  CSV_URL: "MLproject/premier_league_complete_stats_until31thGameDayOnSeason2025-26_preprocessing.csv"
  TARGET_VAR: "Rating"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.12.7
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.7'

    - name: Check Env
      run: |
        echo $CSV_URL

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow 

    - name: Run mlflow project
      run: |
        mlflow run MLProject --env-manager=local

    - name: Get latest MLflow run_id
      run: |
        RUN_ID=$(ls -t MLProject/mlruns/0 | grep -v "meta.yaml" | head -n 1)
        echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
        echo "Latest run_id: $RUN_ID"
          
    # Simpan Artifak ke GitHub 
    - name: Upload to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: MLProject/mlruns/

    - name: Build Docker Model
      run: |
        mlflow models build-docker -m "runs:/$RUN_ID/best_random_forest_model" -n "pl-model" --enable-mlserver

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Tag Docker Image
      run: |
        docker tag pl-model ${{ secrets.DOCKER_USERNAME }}/pl-model:latest

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/pl-model:latest