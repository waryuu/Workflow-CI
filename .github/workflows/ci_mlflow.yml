name: MLflow CI Docker Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:   

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.12.7
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.7'

    - name: Check env
      run: |
        echo "OS: $(uname -a)"
        echo "Python version: $(python3 --version)"
        echo "Docker version: $(docker --version)"
        echo "Workspace: $GITHUB_WORKSPACE"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow dagshub scikit-learn pandas matplotlib seaborn joblib

    - name: Run mlflow project
      env:
        MLFLOW_TRACKING_URI: https://dagshub.com/waryuu/Eksperimen_SML_Wahyudi-Putra.mlflow
        MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
        MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      run: |
        mlflow run MLProject/ --env-manager local

    - name: Get latest MLflow run_id
      run: |
        echo "RUN_ID=$(mlflow runs list --experiment-id 0 --max-results 1 --output csv | tail -n 1 | cut -d, -f1)" >> $GITHUB_ENV

    # Simpan Artifak ke GitHub 
    - name: Upload to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: mlruns/

    - name: Build Docker Model
      run: |
        mlflow models build-docker -m "models:/Premier_League_Rating/latest" -n "pl-model-local" --enable-mlserver


    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Tag docker image
      run: |
        docker tag pl-model-local:latest waryuu9/pl-model-ci:latest

    - name: Push to Docker Hub
      run: docker push waryuu9/pl-model-ci:latest